services:

  # ----------------------------------------------------------------------
  # PostgreSQL 15 + pgvector — relational store + semantic similarity
  # ----------------------------------------------------------------------
  postgres:
    image: devanshhh2651/socmint-pgvector:pg15
    env_file: .env
    environment:
      POSTGRES_DB: socmint
      POSTGRES_USER: socmint
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socmint -d socmint"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------------------
  # Neo4j 5 Community — identity graph store
  # ----------------------------------------------------------------------
  neo4j:
    image: devanshhh2651/socmint-neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      # Graph Data Science plugin enables Louvain community detection. The JAR is
      # provisioned directly via the ./neo4j/plugins bind-mount below (compatible
      # GDS build for this Neo4j version) rather than Neo4j's CDN auto-downloader,
      # so it works in network-restricted/offline deployments. The GraphBuilder
      # still degrades to an in-process label-propagation fallback if the plugin
      # is ever absent, so this remains an enhancement, not a hard dependency.
      NEO4J_dbms_security_procedures_unrestricted: gds.*
      NEO4J_dbms_security_procedures_allowlist: gds.*
    volumes:
      - neo4jdata:/data
      - ./neo4j/plugins:/plugins        # GDS plugin JAR (offline-provisioned)
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------------
  # Redis 7 — Celery broker + result backend
  # ----------------------------------------------------------------------
  redis:
    image: devanshhh2651/socmint-redis:7-alpine
    env_file: .env
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ----------------------------------------------------------------------
  # MinIO — object storage for preserved evidence artifacts
  # ----------------------------------------------------------------------
  minio:
    image: devanshhh2651/socmint-minio:latest
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"   # Console UI
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------------------
  # Tor SOCKS proxy — anonymised egress for Tier 3 passive recon (port 9050)
  # ----------------------------------------------------------------------
  tor:
    image: devanshhh2651/socmint-tor:latest
    restart: unless-stopped
    expose:
      - "9050"

  # ----------------------------------------------------------------------
  # Celery worker (Python tools) — Tier 1/2/3/4 Python adapters
  # ----------------------------------------------------------------------
  worker_python:
    build:
      context: .
      dockerfile: worker_python/Dockerfile
    image: ${DOCKERHUB_USER:-devanshhh2651}/socmint-worker_python:latest
    env_file: .env
    environment:
      TOR_PROXY: socks5://tor:9050   # route Tor-tier adapters via the sidecar
      # The Go OSINT binaries (enola, DetectDee, email2whatsapp, ...) are
      # compiled in the worker_go image and shared in via the go_tools volume.
      GO_TOOLS_DIR: /opt/go_tools
      # Persist the Hugging Face model cache (CLIP avatar + bio embeddings) so
      # the ~600 MB CLIP model downloads once, not on every container restart.
      HF_HOME: /root/.cache/huggingface
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      LLM_NARRATIVES_ENABLED: ${LLM_NARRATIVES_ENABLED:-1}
      # Face recognition (FaceNet) links the same person across different photos.
      # Disable with FACE_RECOGNITION=0; degrades gracefully if weights missing.
      FACE_RECOGNITION: ${FACE_RECOGNITION:-1}
      TORCH_HOME: /root/.cache/torch
      # New OSINT adapter credentials (all optional — degrade to unavailable)
      EMAILREP_API_KEY: ${EMAILREP_API_KEY:-}
      CENSYS_API_ID: ${CENSYS_API_ID:-}
      CENSYS_API_SECRET: ${CENSYS_API_SECRET:-}
      DNSDUMPSTER_API_KEY: ${DNSDUMPSTER_API_KEY:-}
      PICARTA_API_KEY: ${PICARTA_API_KEY:-}
      AI_GEOLOCATION_ENABLED: ${AI_GEOLOCATION_ENABLED:-0}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
    command: celery -A worker_python.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      tor:
        condition: service_started
      worker_go:
        condition: service_started
    volumes:
      - ./worker_python:/app/worker_python   # hot-reload during development
      - ./api:/app/api                       # hot-reload during development
      - ./worker_go:/app/worker_go           # cross-package adapters (Go tier)
      # NOTE: the git-distributed OSINT tools are baked into the image at
      # /tools/python; do NOT bind-mount over it or the cloned tools vanish.
      - go_tools:/opt/go_tools:ro            # compiled Go binaries from worker_go
      - evidence_cases:/app/cases
      - hf_cache:/root/.cache/huggingface    # persist CLIP/MiniLM model cache
      - torch_cache:/root/.cache/torch       # persist FaceNet weights
    restart: unless-stopped

  # ----------------------------------------------------------------------
  # Celery worker (Go binaries) — Enola, DetectDee, Mailsleuth, etc.
  # ----------------------------------------------------------------------
  worker_go:
    build:
      context: .
      dockerfile: worker_go/Dockerfile
    image: ${DOCKERHUB_USER:-devanshhh2651}/socmint-worker_go:latest
    env_file: .env
    # Publish the image-baked Go binaries into the shared go_tools volume on
    # startup so worker_python (which runs the Go adapters inline in its tier2
    # chains) can health-check and execute them too.
    # ``--queues go`` is REQUIRED: this worker only registers ``go.run_adapter``
    # and a Celery worker DISCARDS any message whose task it doesn't know. If it
    # consumed the shared default queue it would destroy ~half of every scan's
    # pipeline tasks (the "most tools stuck pending" failure mode).
    command: >
      sh -c "mkdir -p /opt/go_tools && cp -f /app/tools/go/* /opt/go_tools/ 2>/dev/null || true;
      exec celery -A worker_go.celery_app worker --loglevel=info --concurrency=2 --queues go"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./worker_go:/app/worker_go
      - ./api:/app/api
      - ./worker_python:/app/worker_python   # cross-package base adapter
      # NOTE: the compiled Go binaries are baked into the image at
      # /app/tools/go; do NOT bind-mount over it or the binaries vanish.
      - go_tools:/opt/go_tools               # publish binaries for worker_python
      - evidence_cases:/app/cases
    restart: unless-stopped

  # ----------------------------------------------------------------------
  # Celery beat — durable scan-recovery scheduler
  # ----------------------------------------------------------------------
  # Emits the periodic ``pipeline.recover_stuck_correlations`` task from a
  # persisted schedule. This is the crash-proof backstop for the in-memory
  # countdown correlation watchdog: if a worker restart loses both a chord
  # callback AND its countdown watchdog, beat still re-runs correlation for the
  # stuck run on its next tick. Lightweight (single beat loop, no task pool).
  worker_beat:
    build:
      context: .
      dockerfile: worker_python/Dockerfile
    image: ${DOCKERHUB_USER:-devanshhh2651}/socmint-worker_python:latest
    env_file: .env
    command: celery -A worker_python.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./worker_python:/app/worker_python
      - ./api:/app/api
      - ./worker_go:/app/worker_go
    restart: unless-stopped

  # ----------------------------------------------------------------------
  # FastAPI gateway
  # ----------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: ${DOCKERHUB_USER:-devanshhh2651}/socmint-api:latest
    env_file: .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      LLM_NARRATIVES_ENABLED: ${LLM_NARRATIVES_ENABLED:-1}
      # Photo geolocation + preservation (run in API service context)
      PICARTA_API_KEY: ${PICARTA_API_KEY:-}
      AI_GEOLOCATION_ENABLED: ${AI_GEOLOCATION_ENABLED:-0}
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ./worker_python:/app/worker_python
      - ./worker_go:/app/worker_go           # lazy import in preservation service
      - evidence_cases:/app/cases
    restart: unless-stopped

  # ----------------------------------------------------------------------
  # Streamlit analyst dashboard
  # ----------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    image: ${DOCKERHUB_USER:-devanshhh2651}/socmint-dashboard:latest
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app/dashboard
    restart: unless-stopped

  # ----------------------------------------------------------------------
  # Ollama — local LLM runtime for grounded narrative generation (optional).
  # Narratives degrade gracefully to deterministic text when this service is
  # absent or still pulling its model, so nothing in the pipeline hard-depends
  # on it (no other service lists it under depends_on).
  # ----------------------------------------------------------------------
  ollama:
    image: devanshhh2651/socmint-ollama:latest
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    # Serve in the background, wait for readiness, pull the model once (cached in
    # the named volume), then keep the server in the foreground.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        pid=$$!
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull ${OLLAMA_MODEL:-llama3.2:3b} || echo "WARN: ollama model pull failed; narratives degrade to deterministic"
        wait $$pid
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
  neo4jdata:
  miniodata:
  evidence_cases:
  go_tools:
  hf_cache:
  ollama_models:
  torch_cache:
